services:
  app:
    build: .
    image: mentor-agent
    # 默认只绑定本机回环，前面套 Nginx/Caddy 再对外（Streamlit 自身无鉴权）。
    # 想直接局域网访问就改成 "8501:8501"。
    ports:
      - "127.0.0.1:8501:8501"
    env_file: .env
    environment:
      # 国内服务器走 hf-mirror 下载模型；.env 里设了 HF_ENDPOINT 会覆盖这里
      HF_ENDPOINT: ${HF_ENDPOINT:-https://hf-mirror.com}
    volumes:
      # 数据组更新文档：改宿主机 knowledge_base/ 后跑一次 ingest（见 DEPLOY.md）
      - ./knowledge_base:/app/knowledge_base
      # 向量库持久化，重建成本高，务必保留
      - ./chroma_db:/app/chroma_db
      # HF 模型缓存（bge-small-zh + reranker 共约 1.2GB），升级镜像不用重新下载
      - hf-cache:/root/.cache/huggingface
    restart: unless-stopped

volumes:
  hf-cache:
